name: Deploy Dev

on:
  pull_request:
    branches:
      - dev

permissions:
  contents: read

jobs:
  deploy-dev:
    uses: HassanSantos/github-actions-templates/.github/workflows/deploy-dev.yml@main
    with:
      app-name: voting-system
      image-name: hassansena/voting-system
      app-dir: /home/hss-admin/apps/voting-system
      java-version: '25'
      host-port: '8080'
      container-port: '8080'
      spring-profile: dev
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
